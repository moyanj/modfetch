name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv venv
          uv sync --dev
        shell: bash

      - name: Build with Nuitka
        run: uv run build.py
        shell: bash

      - name: Package Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x modfetch.bin
          tar -czf modfetch-linux-amd64.tar.gz modfetch.bin

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          7z a modfetch-windows-amd64.zip modfetch.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            modfetch-linux-amd64.tar.gz
            modfetch-windows-amd64.zip
          retention-days: 7
