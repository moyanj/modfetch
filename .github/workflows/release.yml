name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # 构建多平台可执行文件
  build-binaries:
    name: Build ${{ matrix.os }} Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv venv
          uv sync --dev
        shell: bash

      - name: Build with Nuitka
        run: uv run build.py
        shell: bash

      - name: Package Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x modfetch.bin
          tar -czf modfetch-linux-amd64.tar.gz modfetch.bin
          echo "ASSET_NAME=modfetch-linux-amd64.tar.gz" >> $GITHUB_ENV
          echo "ASSET_PATH=modfetch-linux-amd64.tar.gz" >> $GITHUB_ENV

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          7z a modfetch-windows-amd64.zip modfetch.bin
          echo "ASSET_NAME=modfetch-windows-amd64.zip" >> $env:GITHUB_ENV
          echo "ASSET_PATH=modfetch-windows-amd64.zip" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            modfetch-linux-amd64.tar.gz
            modfetch-windows-amd64.zip
          retention-days: 1

  # 构建并发布到 PyPI
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # 创建 GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-pypi]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # 获取当前 tag 和上一个 tag 之间的提交
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "## What's Changed" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s" --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "## Full Changelog" >> $GITHUB_OUTPUT
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/$VERSION" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "## What's Changed" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s" --no-merges $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "## Full Changelog" >> $GITHUB_OUTPUT
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$VERSION" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## 安装

            ### 通过 pip 安装
            ```bash
            pip install modfetch==${VERSION#v}
            ```

            ### 下载预编译二进制文件
            根据你的平台下载对应的文件：
            - Linux: `modfetch-linux-amd64.tar.gz`
            - Windows: `modfetch-windows-amd64.zip`

            ## 校验和
            下载后请验证文件完整性。
          files: |
            artifacts/binary-ubuntu-latest/modfetch-linux-amd64.tar.gz
            artifacts/binary-windows-latest/modfetch-windows-amd64.zip
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
